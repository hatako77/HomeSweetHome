name: Build and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install PlatformIO
      run: pip install platformio
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep "FULL_VERSION_STRING" src/version.h | cut -d'"' -f2)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build firmware
      run: pio run -e esp32dev
    
    - name: Create release
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/firmware-${{ env.VERSION }}.bin
        echo "${{ env.VERSION }}" > release/version.txt
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v${{ env.VERSION }}
        path: release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        files: |
          release/firmware-${{ env.VERSION }}.bin
          release/version.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
