name: Build and Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'نوع افزایش نسخه'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch    # 1.0.0 → 1.0.1
          - minor    # 1.0.0 → 1.1.0
          - major    # 1.0.0 → 2.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # مهم برای دسترسی به تاریخچه کامل

    - name: Install PlatformIO
      run: pip install platformio

    - name: Get current version
      id: current_version
      run: |
        MAJOR=$(sed -n 's/#define VERSION_MAJOR \([0-9]*\)/\1/p' src/version.h)
        MINOR=$(sed -n 's/#define VERSION_MINOR \([0-9]*\)/\1/p' src/version.h)
        PATCH=$(sed -n 's/#define VERSION_PATCH \([0-9]*\)/\1/p' src/version.h)
        
        echo "MAJOR=$MAJOR" >> $GITHUB_ENV
        echo "MINOR=$MINOR" >> $GITHUB_ENV
        echo "PATCH=$PATCH" >> $GITHUB_ENV
        
        echo "📦 Current version: $MAJOR.$MINOR.$PATCH"

    - name: Calculate new version
      id: new_version
      run: |
        MAJOR=${{ env.MAJOR }}
        MINOR=${{ env.MINOR }}
        PATCH=${{ env.PATCH }}
        
        TYPE="${{ github.event.inputs.version_type }}"
        
        if [ "$TYPE" = "major" ]; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif [ "$TYPE" = "minor" ]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          PATCH=$((PATCH + 1))
        fi
        
        VERSION="$MAJOR.$MINOR.$PATCH"
        
        echo "NEW_MAJOR=$MAJOR" >> $GITHUB_ENV
        echo "NEW_MINOR=$MINOR" >> $GITHUB_ENV
        echo "NEW_PATCH=$PATCH" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        echo "📦 New version: $VERSION"

    - name: Update version.h
      run: |
        sed -i "s/#define VERSION_MAJOR .*/#define VERSION_MAJOR ${{ env.NEW_MAJOR }}/" src/version.h
        sed -i "s/#define VERSION_MINOR .*/#define VERSION_MINOR ${{ env.NEW_MINOR }}/" src/version.h
        sed -i "s/#define VERSION_PATCH .*/#define VERSION_PATCH ${{ env.NEW_PATCH }}/" src/version.h

    - name: Build firmware
      run: pio run -e esp32dev

    - name: Create release files
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/firmware.bin
        cp .pio/build/esp32dev/partition_table.bin release/partition.bin || echo "⚠️ partition.bin not found"
        cp .pio/build/esp32dev/bootloader.bin release/bootloader.bin || echo "⚠️ bootloader.bin not found"
        echo "${{ env.VERSION }}" > release/version.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v${{ env.VERSION }}
        path: release/
        retention-days: 30

    - name: Commit version changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add src/version.h
        
        # فقط اگر تغییری وجود داشت
        if ! git diff --staged --quiet; then
          echo "📝 Changes detected, committing..."
          
          # اول pull کن تا با remote هماهنگ شود
          git pull --rebase origin ${{ github.ref_name }} || git pull --rebase
          
          # commit کن
          git commit -m "Bump version to ${{ env.VERSION }} [skip ci]"
          
          # push کن
          git push origin ${{ github.ref_name }}
        else
          echo "✅ No changes to commit"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release/firmware.bin
          release/partition.bin
          release/bootloader.bin
          release/version.txt
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
