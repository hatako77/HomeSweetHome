name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # این خط را اضافه کنید تا بتوانید به‌صورت دستی اجرا کنید

env:
  PROJECT_NAME: esp32-ota

jobs:
  build:
    runs-on: ubuntu-latest
    # با اضافه کردن این بخش، از اجرای همزمان چند workflow جلوگیری می‌شود
    concurrency: 
      group: release-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Get version
      id: version
      run: |
        VERSION_MAJOR=$(grep -E '#define VERSION_MAJOR' src/version.h | sed -E 's/.*VERSION_MAJOR ([0-9]+).*/\1/')
        VERSION_MINOR=$(grep -E '#define VERSION_MINOR' src/version.h | sed -E 's/.*VERSION_MINOR ([0-9]+).*/\1/')
        VERSION_PATCH=$(grep -E '#define VERSION_PATCH' src/version.h | sed -E 's/.*VERSION_PATCH ([0-9]+).*/\1/')
        BUILD_NUMBER=$(grep -E '#define BUILD_NUMBER' src/version.h | sed -E 's/.*BUILD_NUMBER ([0-9]+).*/\1/' || echo "1")
        
        VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}.${BUILD_NUMBER}"
        
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        echo "📦 Version extracted: $VERSION"

    - name: Update build number
      run: |
        CURRENT_BUILD=$(grep -E '#define BUILD_NUMBER' src/version.h | sed -E 's/.*BUILD_NUMBER ([0-9]+).*/\1/' || echo "0")
        NEW_BUILD=$((CURRENT_BUILD + 1))
        sed -i "s/#define BUILD_NUMBER .*/#define BUILD_NUMBER $NEW_BUILD/" src/version.h
        echo "🔢 Build number updated: $CURRENT_BUILD → $NEW_BUILD"

    - name: Build firmware
      run: |
        pio run -e esp32dev

    - name: Create release directory
      run: |
        mkdir -p release
        if [ -f ".pio/build/esp32dev/firmware.bin" ]; then
          cp .pio/build/esp32dev/firmware.bin release/firmware-${{ env.VERSION }}.bin
        fi
        if [ -f ".pio/build/esp32dev/partition_table.bin" ]; then
          cp .pio/build/esp32dev/partition_table.bin release/partition_table.bin || true
        fi
        if [ -f ".pio/build/esp32dev/bootloader.bin" ]; then
          cp .pio/build/esp32dev/bootloader.bin release/bootloader.bin || true
        fi
        echo "${{ env.VERSION }}" > release/version.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v${{ env.VERSION }}
        path: |
          release/
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/partition_table.bin
          .pio/build/esp32dev/bootloader.bin
        retention-days: 30
        if-no-files-found: warn

    - name: Create GitHub Release
      # شرط را اصلاح کردیم تا برای workflow_dispatch هم کار کند
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release/firmware-${{ env.VERSION }}.bin
          release/partition_table.bin
          release/bootloader.bin
          release/version.txt
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
