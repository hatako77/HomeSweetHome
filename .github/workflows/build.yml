name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'نوع تغییرات نسخه (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      build_number:
        description: 'شماره بیلد (اختیاری)'
        required: false
        type: string
        default: ''

env:
  PROJECT_NAME: esp32-ota

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: 
      group: release-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Get current version
      id: version
      run: |
        VERSION_MAJOR=$(grep -E '#define VERSION_MAJOR' src/version.h | sed -E 's/.*VERSION_MAJOR ([0-9]+).*/\1/')
        VERSION_MINOR=$(grep -E '#define VERSION_MINOR' src/version.h | sed -E 's/.*VERSION_MINOR ([0-9]+).*/\1/')
        VERSION_PATCH=$(grep -E '#define VERSION_PATCH' src/version.h | sed -E 's/.*VERSION_PATCH ([0-9]+).*/\1/')
        BUILD_NUMBER=$(grep -E '#define BUILD_NUMBER' src/version.h | sed -E 's/.*BUILD_NUMBER ([0-9]+).*/\1/' || echo "1")
        
        echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
        echo "VERSION_MINOR=$VERSION_MINOR" >> $GITHUB_ENV
        echo "VERSION_PATCH=$VERSION_PATCH" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        
        echo "📦 Current version: $VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH.$BUILD_NUMBER"

    - name: Update version based on input
      if: github.event_name == 'workflow_dispatch'
      run: |
        MAJOR=${{ env.VERSION_MAJOR }}
        MINOR=${{ env.VERSION_MINOR }}
        PATCH=${{ env.VERSION_PATCH }}
        BUILD=${{ env.BUILD_NUMBER }}
        
        # اگر شماره بیلد دستی داده شده، از آن استفاده کن
        if [ -n "${{ github.event.inputs.build_number }}" ]; then
          BUILD="${{ github.event.inputs.build_number }}"
        else
          BUILD=$((BUILD + 1))
        fi
        
        # به‌روزرسانی بر اساس نوع تغییرات
        VERSION_TYPE="${{ github.event.inputs.version_type }}"
        if [ "$VERSION_TYPE" = "major" ]; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif [ "$VERSION_TYPE" = "minor" ]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          # patch
          PATCH=$((PATCH + 1))
        fi
        
        # ذخیره نسخه جدید
        echo "NEW_MAJOR=$MAJOR" >> $GITHUB_ENV
        echo "NEW_MINOR=$MINOR" >> $GITHUB_ENV
        echo "NEW_PATCH=$PATCH" >> $GITHUB_ENV
        echo "NEW_BUILD=$BUILD" >> $GITHUB_ENV
        
        VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        echo "🔄 New version: $VERSION"

    - name: Update version on push
      if: github.event_name == 'push'
      run: |
        MAJOR=${{ env.VERSION_MAJOR }}
        MINOR=${{ env.VERSION_MINOR }}
        PATCH=${{ env.VERSION_PATCH }}
        BUILD=$(( ${{ env.BUILD_NUMBER }} + 1 ))
        
        VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        echo "NEW_MAJOR=$MAJOR" >> $GITHUB_ENV
        echo "NEW_MINOR=$MINOR" >> $GITHUB_ENV
        echo "NEW_PATCH=$PATCH" >> $GITHUB_ENV
        echo "NEW_BUILD=$BUILD" >> $GITHUB_ENV
        
        echo "🔄 New version: $VERSION"

    - name: Update version.h file
      run: |
        if [ -n "${{ env.NEW_MAJOR }}" ]; then
          sed -i "s/#define VERSION_MAJOR .*/#define VERSION_MAJOR ${{ env.NEW_MAJOR }}/" src/version.h
          sed -i "s/#define VERSION_MINOR .*/#define VERSION_MINOR ${{ env.NEW_MINOR }}/" src/version.h
          sed -i "s/#define VERSION_PATCH .*/#define VERSION_PATCH ${{ env.NEW_PATCH }}/" src/version.h
          sed -i "s/#define BUILD_NUMBER .*/#define BUILD_NUMBER ${{ env.NEW_BUILD }}/" src/version.h
        fi

    - name: Build firmware and SPIFFS
      run: |
        pio run -e esp32dev
        pio run -e esp32dev -t buildfs

    - name: Create release directory
      run: |
        mkdir -p release
        
        # کپی firmware
        if [ -f ".pio/build/esp32dev/firmware.bin" ]; then
          cp .pio/build/esp32dev/firmware.bin release/firmware-${{ env.VERSION }}.bin
        fi
        
        # کپی partition table
        if [ -f ".pio/build/esp32dev/partition_table.bin" ]; then
          cp .pio/build/esp32dev/partition_table.bin release/partition_table.bin || true
        fi
        
        # کپی bootloader
        if [ -f ".pio/build/esp32dev/bootloader.bin" ]; then
          cp .pio/build/esp32dev/bootloader.bin release/bootloader.bin || true
        fi
        
        # کپی SPIFFS
        if [ -f ".pio/build/esp32dev/spiffs.bin" ]; then
          cp .pio/build/esp32dev/spiffs.bin release/spiffs-${{ env.VERSION }}.bin
        fi
        
        # ذخیره نسخه
        echo "${{ env.VERSION }}" > release/version.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v${{ env.VERSION }}
        path: |
          release/
          .pio/build/esp32dev/firmware.bin
          .pio/build/esp32dev/spiffs.bin
          .pio/build/esp32dev/partition_table.bin
          .pio/build/esp32dev/bootloader.bin
        retention-days: 30
        if-no-files-found: warn

    - name: Commit version changes
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add src/version.h
        git diff --staged --quiet || git commit -m "Bump version to ${{ env.VERSION }} [skip ci]"
        git push || echo "Push failed"

    - name: Create GitHub Release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release/firmware-${{ env.VERSION }}.bin
          release/spiffs-${{ env.VERSION }}.bin
          release/partition_table.bin
          release/bootloader.bin
          release/version.txt
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify success
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 Version: ${{ env.VERSION }}"
        echo "📁 Files:"
        ls -la release/ || echo "No release files found"
