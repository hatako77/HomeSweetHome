name: Build Firmware

on:
  workflow_dispatch:
    inputs:

      version_type:
        description: "Version Type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

      release_notes:
        description: "Release Notes"
        required: true
        type: string

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build
        run: pio run

      - name: Prepare Output
        run: |
          mkdir output

          cp .pio/build/esp32dev/firmware.bin output/
          cp .pio/build/esp32dev/bootloader.bin output/
          cp .pio/build/esp32dev/partitions.bin output/

          echo "Version Type: ${{ github.event.inputs.version_type }}" > output/release_notes.txt
          echo "" >> output/release_notes.txt
          echo "${{ github.event.inputs.release_notes }}" >> output/release_notes.txt

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: output/firmware.bin

      - name: Upload Bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: output/bootloader.bin

      - name: Upload Partitions
        uses: actions/upload-artifact@v4
        with:
          name: partitions
          path: output/partitions.bin

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release_notes
          path: output/release_notes.txt
