name: Manual Release HomeSweetHome

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (patch / minor / major)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          pip install platformio jq

      # =========================
      # Bump version
      # =========================
      - name: Bump version
        run: |
          python scripts/bump_version.py ${{ inputs.bump_type }}

      # =========================
      # Generate version.json
      # =========================
      - name: Generate version.json
        run: |
          python scripts/generate_version.py

      # =========================
      # Commit version.json (optional)
      # =========================
      - name: Commit version.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.json
          git commit -m "Bump version ${{ inputs.bump_type }}" || echo "No changes"
          git push

      # =========================
      # Sync Version.h  ⭐ IMPORTANT (before build)
      # =========================
      - name: Sync Version.h
        run: |
          VERSION=$(cat version.json | jq -r '.version')
          mkdir -p include
          echo "#ifndef VERSION_H" > include/Version.h
          echo "#define VERSION_H" >> include/Version.h
          echo "#define APP_NAME \"HomeSweetHome\"" >> include/Version.h
          echo "#define APP_VERSION \"$VERSION\"" >> include/Version.h
          echo "#define APP_BUILD \"auto\"" >> include/Version.h
          echo "#endif" >> include/Version.h

      # =========================
      # Build firmware
      # =========================
      - name: Build firmware
        run: |
          pio run

      # =========================
      # Read version
      # =========================
      - name: Read version
        id: ver
        run: |
          VERSION=$(cat version.json | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # =========================
      # Rename firmware
      # =========================
      - name: Rename firmware
        run: |
          cp .pio/build/esp32dev/firmware.bin HomeSweetHome_v${{ steps.ver.outputs.version }}.bin

      # =========================
      # Create GitHub Release
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: HomeSweetHome v${{ steps.ver.outputs.version }}
          files: |
            HomeSweetHome_v${{ steps.ver.outputs.version }}.bin
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
