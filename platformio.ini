[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
build_flags = 
    -D VERSION_MAJOR=1
    -D VERSION_MINOR=0
    -D VERSION_PATCH=0
lib_deps = 
    ESP32Async/ESPAsyncWebServer @ ^3.11.1
    ESP32Async/AsyncTCP @ ^3.4.3
    bblanchon/ArduinoJson @ ^6.19.4
lib_ldf_mode = deep
