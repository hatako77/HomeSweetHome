[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@6.11.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.partitions = partitions.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Wall
    -Wextra

lib_deps =
    bblanchon/ArduinoJson@^7.4.2

monitor_filters =
    esp32_exception_decoder
